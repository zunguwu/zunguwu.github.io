<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMTRepo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a; /* Nền tối sâu để nổi bật màu neon */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        .repo-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 85%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .avatar {
            width: 90px;
            height: 90px;
            background: linear-gradient(45deg, #00f2fe 0%, #4facfe 100%);
            border-radius: 24px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            color: white;
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.4);
        }

        h1 {
            font-size: 1.7rem;
            margin-bottom: 30px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .btn {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border-radius: 18px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid transparent;
        }

        .btn i {
            font-size: 1.5rem;
            margin-right: 15px;
            width: 30px;
            text-align: center;
        }

        /* Màu Neon cho từng nút */
        .btn-cydia {
            background: rgba(168, 85, 24, 0.15);
            color: #fb923c;
            border-color: rgba(251, 146, 60, 0.3);
        }
        .btn-cydia:hover {
            background: #fb923c;
            color: white;
            box-shadow: 0 0 20px rgba(251, 146, 60, 0.5);
        }

        .btn-sileo {
            background: rgba(34, 211, 238, 0.15);
            color: #22d3ee;
            border-color: rgba(34, 211, 238, 0.3);
        }
        .btn-sileo:hover {
            background: #22d3ee;
            color: #083344;
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.5);
        }

        .btn-zebra {
            background: rgba(244, 114, 182, 0.15);
            color: #f472b6;
            border-color: rgba(244, 114, 182, 0.3);
        }
        .btn-zebra:hover {
            background: #f472b6;
            color: white;
            box-shadow: 0 0 20px rgba(244, 114, 182, 0.5);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .footer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="repo-card">
        <div class="avatar">
            <i class="fa-solid fa-cube"></i>
        </div>
        <h1>NMT Repo</h1>
        
        <div class="btn-list">
            <a href="cydia://url/https://cydia.saurik.com/api/share#?source=https://zunguwu.github.io/" class="btn btn-cydia">
                <i class="fa-solid fa-skull-crossbones"></i>
                Add to Cydia
            </a>

            <a href="sileo://source/https://zunguwu.github.io/" class="btn btn-sileo">
                <i class="fa-solid fa-bolt-lightning"></i>
                Add to Sileo
            </a>

            <a href="zbra://sources/add/https://zunguwu.github.io/" class="btn btn-zebra">
                <i class="fa-solid fa-horse"></i>
                Add to Zebra
            </a>
        </div>

        <div class="footer">
            Design for Jailbreak
        </div>
    </div>

</body>
</html>
